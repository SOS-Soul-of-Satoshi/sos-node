name: Network Smoke

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [main]
    paths:
      - "genesis.json"
      - "genesis.json.sha256"
      - "scripts/sos-public-probe.py"
      - ".github/workflows/network-smoke.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sos-public-network-smoke
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOS_EXPECTED_GENESIS_SHA256: 6d20c7a7e6fa4706d4f9e2bcc0ad23c8a144601aee391301ef0912e3c809e524
      SOS_EXPECTED_GENESIS_VALIDATORS: "3"
      SOS_BRIDGE_CONTRACT: 0xB8863C0c094DE2f3f0C50EF96101b53B7374F0C9
      SOS_EXPECTED_BRIDGE_DOMAIN: 0xb706d5afab98a2371bc5593e86be8ee1262f94dff4c1577741e1f506dd1a27ea
      SOS_EXPECTED_TVL_CAP_SATS: "1000000000000"
      SOS_EXPECTED_MAX_DEPOSIT_SATS: "100000000000"
      SOS_EXPECTED_BATCH_IMAGE_ID: 0xba49fa2641bb0e1ded53525b20311645ec03218f2184b88c5cc941eb87e58db0
      SOS_EXPECTED_VALSET_IMAGE_ID: 0x782999f999d1678e5b6fe9db05ef5a719e6af116bcf68929bd980e893f3715b1
      SOS_EXPECTED_CHAIN_ID: "5459795"
      SOS_EXPECTED_ETHEREUM_CHAIN_ID: "11155111"
      SOS_LIFECYCLE_MAX_AGE_SECONDS: "180"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify pinned genesis
        run: sha256sum -c genesis.json.sha256

      - name: Self-test probe
        run: python3 scripts/sos-public-probe.py --self-test

      - name: Probe live network
        run: python3 scripts/sos-public-probe.py --pretty
