name: Source Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install checksum-pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "$archive"
          echo "$GITLEAKS_SHA256  $archive" | sha256sum -c -
          tar -xzf "$archive" -C /tmp gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Reject leaked credentials and generated build trees
        run: |
          set -euo pipefail
          gitleaks dir . --no-banner --redact=100 --max-target-megabytes=100
          if git ls-files | grep -q '/target/'; then
            echo "Generated target/ files are tracked by Git." >&2
            exit 1
          fi
          git diff --check

